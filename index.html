<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <!-- ESSA É A LINHA MÁGICA PARA O DOWNLOADER -->

    <meta http-equiv="refresh" content="1; url=https://geovx99.github.io/LUNA-IPTV/">
    
    <title>Baixando Luna TV...</title>
    
    <style>
        body {

            align-items: center;
            height: 100vh;

        .container {
