<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciando Download...</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000; /* Fundo totalmente preto */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #e0e0e0; /* Texto claro para leitura */
        }
        .container {
            text-align: center;
            background: #0a0e17; /* Fundo da caixa um tom acima do preto */
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #1f6feb; /* Borda azul */
            box-shadow: 0 0 20px rgba(31, 111, 235, 0.3); /* Brilho azul ao redor da caixa */
            max-width: 450px;
        }
        h2 {
            color: #58a6ff; /* Azul claro para o título */
            margin-top: 0;
        }
        p {
            color: #8b949e; /* Cinza para não cansar a vista */
            margin-bottom: 25px;
        }
        a.btn {
            background-color: transparent;
            color: #58a6ff;
            text-decoration: none;
            font-weight: bold;
            padding: 12px 24px;
            border: 2px solid #58a6ff;
            border-radius: 6px;
            display: inline-block;
            transition: all 0.3s ease;
        }
        a.btn:hover {
            background-color: #1f6feb; /* Fundo azul ao passar o mouse */
            color: #ffffff;
            box-shadow: 0 0 10px rgba(31, 111, 235, 0.6);
        }
    </style>

    <script>
        // Função que roda assim que a página carrega
        window.onload = function() {
            // SUBSTITUA AQUI: O nome ou caminho do arquivo
            const urlDoArquivo = 'seu-arquivo.zip'; 
            
            const link = document.createElement('a');
            link.href = urlDoArquivo;
            link.download = urlDoArquivo.split('/').pop(); 
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>
</head>
<body>

    <div class="container">
        <h2>Iniciando Download...</h2>
        <p>Seu download deve começar automaticamente. Se o seu navegador bloquear, utilize o botão abaixo:</p>
        
        <!-- Link de download manual estilizado como botão -->
        <a href="seu-arquivo.zip" download class="btn">Baixar Manualmente</a>
    </div>

</body>
</html>
